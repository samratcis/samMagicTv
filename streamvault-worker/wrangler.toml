name = "sammagictv-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for Stalker session/path caching
# Create with: wrangler kv namespace create SV_CACHE
[[kv_namespaces]]
binding = "SV_CACHE"
id = ""  # Set your KV namespace ID here

# D1 database for persistent content storage
# Create with: wrangler d1 create sammagictv-db
[[d1_databases]]
binding = "SV_DB"
database_name = "sammagictv-db"
database_id = ""  # Set your D1 database ID here
migrations_dir = "migrations"

# Daily cleanup: purge data for guests inactive > 7 days (runs at 3am UTC)
[triggers]
crons = ["0 3 * * *"]
